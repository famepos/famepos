<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamePOS Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex flex-col items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-white rounded-3xl p-6 shadow-2xl">
        <h1 class="text-xl font-bold text-center mb-4 text-gray-800">📸 สแกนบาร์โค้ดสินค้า</h1>
        
        <div id="reader" class="overflow-hidden rounded-2xl border-4 border-red-400"></div>
        
        <div id="result" class="mt-4 text-center p-3 bg-gray-100 rounded-xl hidden">
            <p class="text-xs text-gray-400 uppercase font-bold">สแกนสำเร็จ</p>
            <p id="barcode-result" class="text-lg font-mono font-bold text-red-600"></p>
        </div>

        <button onclick="window.close()" class="w-full mt-6 bg-gray-200 text-gray-700 py-3 rounded-2xl font-bold hover:bg-gray-300 transition">
            ยกเลิกและปิดหน้าต่าง
        </button>
    </div>

    <script>
        function onScanSuccess(decodedText) {
            // หยุดการสแกนทันทีที่เจอ
            html5QrcodeScanner.clear();
            
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('barcode-result').innerText = decodedText;

            // 🌟 ส่งข้อมูลกลับไปยังหน้าต่างหลัก (Main Window)
            if (window.opener) {
                window.opener.postMessage({
                    type: 'BARCODE_SCANNED',
                    code: decodedText
                }, '*');
                
                // ปิดหน้าต่างสแกนหลังจากส่งข้อมูลเสร็จ 0.5 วินาทีเพื่อให้คนเห็นเลข
                setTimeout(() => { window.close(); }, 500);
            } else {
                alert("ไม่พบหน้าต่างหลัก กรุณากดปุ่มสแกนจากหน้า POS");
                window.close();
            }
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 20, 
            qrbox: { width: 250, height: 150 },
            aspectRatio: 1.0
        });
        
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
